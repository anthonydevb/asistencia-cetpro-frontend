<div class="login-wrapper">
  <div class="login-container">
    <!-- Sección de imagen de la empresa -->
    <div class="login-image-section">
      <div class="image-content">
        <img 
          [src]="'img/as.png'" 
          alt="Logo de la empresa" 
          class="company-logo"
          (error)="onImageError($event)"
        />
        <div class="company-info">
          <h1 class="company-name">CETPRO</h1>
          <p class="company-subtitle">Sistema de Asistencia</p>
        </div>
      </div>
    </div>

    <!-- Sección del formulario -->
    <div class="login-form-section">
      <div class="login-card">
        <div class="login-header">
          <h2 class="title">Iniciar Sesión</h2>
          <p class="subtitle">Ingresa tus credenciales para acceder al sistema</p>
        </div>

        <!-- Mensaje de error -->
        <div *ngIf="error" class="error-message">
          {{ error }}
        </div>

        <form (ngSubmit)="login()" #loginForm="ngForm" class="login-form">
          <!-- Email -->
          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input
              type="email"
              id="email"
              name="email"
              [(ngModel)]="email"
              required
              placeholder="ejemplo@correo.com"
              [class.invalid]="loginForm.submitted && !email"
            />
            <small *ngIf="loginForm.submitted && !email" class="error-text">
              El correo es obligatorio
            </small>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              name="password"
              [(ngModel)]="password"
              required
              placeholder="Contraseña"
              [class.invalid]="loginForm.submitted && !password"
            />
            <small *ngIf="loginForm.submitted && !password" class="error-text">
              La contraseña es obligatoria
            </small>
          </div>

          <!-- Botón de login -->
          <button type="submit" [disabled]="loading" class="login-button">
            <span *ngIf="!loading">Ingresar</span>
            <span *ngIf="loading" class="loading-spinner"></span>
          </button>

          <!-- Link para recuperar contraseña -->
          <div class="forgot-password-link">
            <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
